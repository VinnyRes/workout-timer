<!DOCTYPE html>
<html>
<head>
    <title>Workout Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        #progress {
            width: 80%;
            height: 30px;
            background-color: #eee;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
        }
        #bar {
            height: 100%;
            width: 0%;
            background-color: #4caf50;
            transition: width 1s linear;
        }
         #startBtn {
        font-size: 18px;
        padding: 10px 20px;
        margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Workout Timer</h1>
     <!-- Add total duration display -->
    <button id="startBtn" onclick="startWorkout()">Start Workout</button>

    <h2 id="exercise">Starting soon...</h2>
    <h1 id="timer">--</h1>
    <h3 id="next">Next: --</h3>
    <h3 id="elapsed">tid</h3>
    <div id="progress"><div id="bar"></div></div>


    <audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" preload="auto"></audio>

    <script>
       let exercises = [
    { name: "Jumping Jacks", duration: 30 },
    { name: "Push-ups", duration: 30 },
    { name: "Squats", duration: 30 },
    { name: "Rest", duration: 10 },
    { name: "Lunges", duration: 30 },
    { name: "Plank", duration: 30 },
    { name: "Burpees", duration: 30 },
    { name: "Rest", duration: 10 },
    { name: "Cool Down - Stretch", duration: 30 },
    { name: "Cool Down - Breathing", duration: 30 }
];

let index = 0;
let timer = null;
let elapsedTime = 0;
let elapsedInterval = null;

function startWorkout() {
    document.getElementById("startBtn").disabled = true;
    startElapsedTimer();
    startNextExercise();
}

function startElapsedTimer() {
    elapsedInterval = setInterval(() => {
        elapsedTime++;
        tid= document.getElementById("elapsed").innerText = "Elapsed Time: " + elapsedTime + "s";
    }, 1000);
}

function stopElapsedTimer() {
    clearInterval(elapsedInterval);
}

function startNextExercise() {
    if (index >= exercises.length) {
        document.getElementById("exercise").innerText = "Workout Complete!";
        document.getElementById("next").innerText = "";
        stopElapsedTimer();
        return;
    }

    let current = exercises[index];
    let next = exercises[index + 1] ? exercises[index + 1].name : "None";
    let timeLeft = current.duration;

    document.getElementById("exercise").innerText = current.name;
    document.getElementById("next").innerText = "Next: " + next;

    updateProgressBar(current.duration);

    timer = setInterval(() => {
        document.getElementById("timer").innerText = timeLeft + "s";
        updateProgress(current.duration, timeLeft);
        timeLeft--;

        if (timeLeft < 0) {
            clearInterval(timer);
            index++;
            startNextExercise();
        }
    }, 1000);
}

function updateProgressBar(duration) {
    let bar = document.getElementById("bar");
    bar.style.width = "100%";
    bar.style.transition = `width ${duration}s linear`;
}

function updateProgress(total, left) {
    let percent = (left / total) * 100;
    document.getElementById("bar").style.width = percent + "%";
}
    </script>
</body>
</html>
